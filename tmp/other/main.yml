name: Daily Update Nuclei POCs

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: 0 Build Release
      run: |
        cargo update
        cargo build --release

    - name: 1 Clone Repos
      run: cargo run --bin 1_clone_repos --release

    - name: 2 Delete Duplicated
      run: cargo run --bin 2_delete_duplicated --release
        
    - name: 3 Move File
      run: cargo run --bin 3_move_file --release

    - name: 4 Check POC 
      run: cargo run --bin 4_check_poc --release

    - name: 5 Advanced Dedup (poc/ → poc_dedup/)
      run: cargo run --bin 5_dedup_advanced --release -- --src-dir poc --dst-dir poc_dedup --threshold 70

    - name: 6 High Quality Tier (poc_dedup/ → poc_gold_*)
      run: cargo run --bin 6_dedup_high_quality --release

    - name: 7 Create github pages index
      run: cargo run --bin 7_generate_browser_index --release
      
    - name: Commit and Push changes
      run: |
        echo $(date +'%Y%m%d%H') > date.txt
        git config --local user.email "admin@adysec.com"
        git config --local user.name "AdySec"
        git add .
        git commit -am "$(date +'%Y%m%d')" || echo "No changes to commit"
        git push -v --progress
