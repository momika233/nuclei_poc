id: ethereum-redundant-code

info:
  name: Redundant Code
  author: Juan Pablo Lopez Yacubian
  severity: low
  description: Redundant logic increases code complexity and maintenance difficulty.
  tags: ethereum,low

file:
  - extensions:
      - sol

    matchers:
      - type: regex
        regex:
          - "return "
          - "if "
          - "else "
        condition: and
