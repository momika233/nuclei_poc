id: ethereum-visibility-flaws

info:
  name: Incorrect Function Visibility
  author: Juan Pablo Lopez Yacubian
  severity: high
  description: Functions are incorrectly marked as public, exposing them to attackers.
  tags: ethereum,high

file:
  - extensions:
      - sol

    matchers:
      - type: regex
        regex:
          - "public"
          - "internal"
          - "external"
        condition: and
